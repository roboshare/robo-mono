query GetMarketsPageData {
  listings(first: 100, orderBy: createdAt, orderDirection: desc) {
    id
    tokenId
    assetId
    seller
    amount
    amountSold
    pricePerToken
    expiresAt
    buyerPaysFee
    status
    isEnded
    createdAt
  }
  primaryPools(first: 100, orderBy: createdAt, orderDirection: desc) {
    id
    tokenId
    assetId
    partner
    pricePerToken
    maxSupply
    immediateProceeds
    protectionEnabled
    isPaused
    isClosed
    createdAt
  }
  vehicles(first: 100) {
    id
    partner
    vin
    make
    model
    year
    metadataURI
  }
}
