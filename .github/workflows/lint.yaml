name: Lint

on:
  push:
    branches:
      - main
      - dev
      - "integration/**"
  pull_request:
    branches:
      - main
      - dev
      - "integration/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect lint scope
    runs-on: ubuntu-latest
    outputs:
      evm: ${{ steps.filter.outputs.evm }}
      sui: ${{ steps.filter.outputs.sui }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.ref }}
          filters: |
            evm:
              - '.github/workflows/lint.yaml'
              - 'package.json'
              - 'yarn.lock'
              - '.yarnrc.yml'
              - '.yarn/**'
              - 'protocols/evm/**'
            sui:
              - '.github/workflows/lint.yaml'
              - 'protocols/sui/**'
            web:
              - '.github/workflows/lint.yaml'
              - 'package.json'
              - 'yarn.lock'
              - '.yarnrc.yml'
              - '.yarn/**'
              - 'web/**'
              - 'protocols/evm/subgraph/**'

  web:
    name: Web lint and types
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup node env
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run nextjs lint
        run: yarn workspace web lint --max-warnings=0

      - name: Check typings on nextjs
        run: yarn workspace web check-types

  evm:
    name: EVM lint
    needs: changes
    if: needs.changes.outputs.evm == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup node env
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Run EVM lint (Solidity + JS)
        run: yarn evm:lint

  sui:
    name: Sui lint
    needs: changes
    if: needs.changes.outputs.sui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if no Sui package exists
        id: package
        run: |
          if [ -f protocols/sui/Move.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No protocols/sui package in this branch; skipping Sui lint."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install suiup
        if: steps.package.outputs.exists == 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Sui CLI
        if: steps.package.outputs.exists == 'true'
        run: |
          "$HOME/.local/bin/suiup" install -y sui@testnet
          "$HOME/.local/bin/suiup" default set sui@testnet

      - name: Prepare non-wallet Sui client config
        if: steps.package.outputs.exists == 'true'
        run: |
          mkdir -p "$HOME/.sui/sui_config"
          cat > "$HOME/.sui/sui_config/client.yaml" <<'YAML'
          ---
          keystore:
            File: /home/runner/.sui/sui_config/sui.keystore
          external_keys:
            External: /home/runner/.sui/sui_config/external.keystore
          envs:
            - alias: testnet
              rpc: "https://fullnode.testnet.sui.io:443"
              ws: ~
              basic_auth: ~
              chain_id: 4c78adac
          active_env: testnet
          active_address: ~
          YAML
          printf '[]\n' > "$HOME/.sui/sui_config/sui.keystore"
          printf '{}\n' > "$HOME/.sui/sui_config/external.keystore"

      - name: Run Sui Move lint
        if: steps.package.outputs.exists == 'true'
        run: sui move build --path protocols/sui --lint --warnings-are-errors
