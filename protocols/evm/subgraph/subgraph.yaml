specVersion: 0.0.4
description: Roboshare Protocol Subgraph
repository: https://github.com/Roboshare/robo-mono
schema:
  file: ./src/schema.graphql
dataSources:
  - kind: ethereum/contract
    name: RoboshareTokens
    network: {{network}}
    source:
      abi: RoboshareTokens
      address: "{{RoboshareTokens.address}}"
      startBlock: {{RoboshareTokens.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - RoboshareTokensContract
        - TransferSingle
        - RevenueTokenInfoSet
      abis:
        - name: RoboshareTokens
          file: ./abis/RoboshareTokens.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed
            address,uint256,uint256)
          handler: handleRoboshareTokensTransferSingle
        - event: RevenueTokenInfoSet(indexed
            uint256,uint256,uint256,uint256,uint256,bool,bool)
          handler: handleRevenueTokenInfoSet
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: RegistryRouter
    network: {{network}}
    source:
      abi: RegistryRouter
      address: "{{RegistryRouter.address}}"
      startBlock: {{RegistryRouter.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - RegistryRouterContract
      abis:
        - name: RegistryRouter
          file: ./abis/RegistryRouter.json
      eventHandlers:
        - event: IdBoundToRegistry(indexed uint256,indexed address)
          handler: handleIdBoundToRegistry
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: VehicleRegistry
    network: {{network}}
    source:
      abi: VehicleRegistry
      address: "{{VehicleRegistry.address}}"
      startBlock: {{VehicleRegistry.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - VehicleRegistryContract
        - VehicleRegistered
      abis:
        - name: VehicleRegistry
          file: ./abis/VehicleRegistry.json
      eventHandlers:
        - event: AssetRegistered(indexed uint256,indexed address,uint256,uint8)
          handler: handleAssetRegistered
        - event: VehicleRegistered(indexed uint256,indexed address,indexed bytes32)
          handler: handleVehicleRegistered
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: Treasury
    network: {{network}}
    source:
      abi: Treasury
      address: "{{Treasury.address}}"
      startBlock: {{Treasury.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - TreasuryContract
        - CollateralLocked
      abis:
        - name: Treasury
          file: ./abis/Treasury.json
      eventHandlers:
        - event: CollateralLocked(indexed uint256,indexed address,uint256)
          handler: handleCollateralLocked
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: EarningsManager
    network: {{network}}
    source:
      abi: EarningsManager
      address: "{{EarningsManager.address}}"
      startBlock: {{EarningsManager.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - EarningsDistribution
        - AssetEarning
      abis:
        - name: EarningsManager
          file: ./abis/EarningsManager.json
      eventHandlers:
        - event: EarningsDistributed(indexed uint256,indexed
            address,uint256,uint256,uint256)
          handler: handleEarningsDistributed
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: Marketplace
    network: {{network}}
    source:
      abi: Marketplace
      address: "{{Marketplace.address}}"
      startBlock: {{Marketplace.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - MarketplaceContract
        - ListingCreated
      abis:
        - name: Marketplace
          file: ./abis/Marketplace.json
      eventHandlers:
        - event: ListingCreated(indexed uint256,indexed uint256,indexed
            uint256,address,uint256,uint256,uint256,bool)
          handler: handleListingCreated
        - event: RevenueTokensTraded(indexed uint256,indexed address,indexed
            address,uint256,uint256,uint256)
          handler: handleRevenueTokensTraded
        - event: ListingEnded(indexed uint256,indexed address)
          handler: handleListingEnded
        - event: ListingExtended(indexed uint256,uint256)
          handler: handleListingExtended
        - event: PrimaryPoolCreated(indexed uint256,indexed
            address,uint256,uint256,bool,bool)
          handler: handlePrimaryPoolCreated
        - event: PrimaryPoolPaused(indexed uint256)
          handler: handlePrimaryPoolPaused
        - event: PrimaryPoolUnpaused(indexed uint256)
          handler: handlePrimaryPoolUnpaused
        - event: PrimaryPoolClosed(indexed uint256)
          handler: handlePrimaryPoolClosed
        - event: PrimaryPoolPurchased(indexed uint256,indexed
            address,uint256,uint256,uint256,uint256)
          handler: handlePrimaryPoolPurchased
        - event: PrimaryPoolRedeemed(indexed uint256,indexed
            address,uint256,uint256,uint256)
          handler: handlePrimaryPoolRedeemed
      file: ./src/mapping.ts
features:
  - fullTextSearch
