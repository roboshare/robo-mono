specVersion: 0.0.4
description: Roboshare Protocol Subgraph
repository: https://github.com/Roboshare/robo-mono
schema:
  file: ./src/schema.graphql
dataSources:
  - kind: ethereum/contract
    name: VehicleRegistry
    network: {{network}}
    source:
      abi: VehicleRegistry
      address: "{{VehicleRegistry.address}}"
      startBlock: {{VehicleRegistry.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities: &entities
        - Vehicle
        - Facility
        - Listing
        - PrimaryPool
        - EarningsDistribution
      abis:
        - name: VehicleRegistry
          file: ./abis/VehicleRegistry.json
      eventHandlers:
        - event: AssetRegistered(indexed uint256,indexed address,uint256,uint8)
          handler: handleVehicleAssetRegistered
        - event: VehicleMetadataUpdated(indexed uint256,string,string)
          handler: handleVehicleMetadataUpdated
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: FacilityRegistry
    network: {{network}}
    source:
      abi: FacilityRegistry
      address: "{{FacilityRegistry.address}}"
      startBlock: "{{FacilityRegistry.startBlock}}"
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities: *entities
      abis:
        - name: FacilityRegistry
          file: ./abis/FacilityRegistry.json
      eventHandlers:
        - event: AssetRegistered(indexed uint256,indexed address,uint256,uint8)
          handler: handleFacilityAssetRegistered
        - event: FacilityRegistered(indexed uint256,indexed address,indexed bytes32)
          handler: handleFacilityRegistered
        - event: FacilityMetadataUpdated(indexed uint256,indexed bytes32,string,string)
          handler: handleFacilityMetadataUpdated
      file: ./src/facility-mapping.ts
  - kind: ethereum/contract
    name: Marketplace
    network: {{network}}
    source:
      abi: Marketplace
      address: "{{Marketplace.address}}"
      startBlock: {{Marketplace.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities: *entities
      abis:
        - name: Marketplace
          file: ./abis/Marketplace.json
      eventHandlers:
        - event: ListingCreated(indexed uint256,indexed uint256,indexed
            uint256,address,uint256,uint256,uint256,bool)
          handler: handleListingCreated
        - event: RevenueTokensTraded(indexed uint256,indexed address,indexed
            address,uint256,uint256,uint256)
          handler: handleRevenueTokensTraded
        - event: ListingEnded(indexed uint256,indexed address)
          handler: handleListingEnded
        - event: ListingExtended(indexed uint256,uint256)
          handler: handleListingExtended
        - event: PrimaryPoolCreated(indexed uint256,indexed
            address,uint256,uint256,bool,bool)
          handler: handlePrimaryPoolCreated
        - event: PrimaryPoolPaused(indexed uint256)
          handler: handlePrimaryPoolPaused
        - event: PrimaryPoolUnpaused(indexed uint256)
          handler: handlePrimaryPoolUnpaused
        - event: PrimaryPoolClosed(indexed uint256)
          handler: handlePrimaryPoolClosed
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: EarningsManager
    network: {{network}}
    source:
      abi: EarningsManager
      address: "{{EarningsManager.address}}"
      startBlock: {{EarningsManager.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities: *entities
      abis:
        - name: EarningsManager
          file: ./abis/EarningsManager.json
      eventHandlers:
        - event: EarningsDistributed(indexed uint256,indexed address,uint256,uint256,uint256)
          handler: handleEarningsDistributed
      file: ./src/mapping.ts
features:
  - fullTextSearch
