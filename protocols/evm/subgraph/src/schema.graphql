type Vehicle @entity(immutable: false) {
  id: ID! # vehicleId
  partner: Bytes!
  vin: String
  make: String
  model: String
  year: BigInt
  assetValue: BigInt!
  metadataURI: String
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Listing @entity(immutable: false) {
  id: ID! # listingId
  tokenId: BigInt!
  assetId: BigInt!
  seller: Bytes!
  amount: BigInt!
  amountSold: BigInt!
  pricePerToken: BigInt!
  expiresAt: BigInt!
  buyerPaysFee: Boolean!
  status: String! # "active", "sold_out", "ended"
  isEnded: Boolean!
  endedAt: BigInt
  createdAt: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PrimaryPool @entity(immutable: false) {
  id: ID! # tokenId
  tokenId: BigInt!
  assetId: BigInt!
  partner: Bytes!
  pricePerToken: BigInt!
  maxSupply: BigInt!
  immediateProceeds: Boolean!
  protectionEnabled: Boolean!
  isPaused: Boolean!
  isClosed: Boolean!
  createdAt: BigInt!
}

type EarningsDistribution @entity(immutable: true) {
  id: ID! # transaction hash + log index
  assetId: BigInt!
  partner: Bytes!
  totalRevenue: BigInt!
  investorEarnings: BigInt!
  period: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
