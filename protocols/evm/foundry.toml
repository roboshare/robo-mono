[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']
fs_permissions = [{ access = "read-write", path = "./"}]
optimizer = true
optimizer_runs = 200
via_ir = true
solc_version = "0.8.28"
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/"
]


[rpc_endpoints]
default_network = "http://127.0.0.1:8545"

mainnet = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
arbitrum = "https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
arbitrumSepolia = "https://arb-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
polygon = "https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
polygonAmoy = "https://polygon-amoy.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
base = "https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
baseSepolia = "https://base-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
monad = "https://monad-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
monadTestnet = "https://monad-testnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

mainnetInfura = "https://mainnet.infura.io/v3/${INFURA_API_KEY}"
sepoliaInfura = "https://sepolia.infura.io/v3/${INFURA_API_KEY}"
arbitrumInfura = "https://arbitrum-mainnet.infura.io/v3/${INFURA_API_KEY}"
arbitrumSepoliaInfura = "https://arbitrum-sepolia.infura.io/v3/${INFURA_API_KEY}"
polygonInfura = "https://polygon-mainnet.infura.io/v3/${INFURA_API_KEY}"
polygonAmoyInfura = "https://polygon-amoy.infura.io/v3/${INFURA_API_KEY}"
baseInfura = "https://base-mainnet.infura.io/v3/${INFURA_API_KEY}"
baseSepoliaInfura = "https://base-sepolia.infura.io/v3/${INFURA_API_KEY}"
monadTestnetInfura = "https://monad-testnet.infura.io/v3/${INFURA_API_KEY}"

localhost = "http://127.0.0.1:8545"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ETHERSCAN_API_KEY}" }
arbitrumSepolia = { key = "${ETHERSCAN_API_KEY}" }
polygon = { key = "${ETHERSCAN_API_KEY}" }
polygonAmoy = { key = "${ETHERSCAN_API_KEY}" }
base = { key = "${ETHERSCAN_API_KEY}" }
baseSepolia = { key = "${ETHERSCAN_API_KEY}" }
monad = { key = "${ETHERSCAN_API_KEY}" }
monadTestnet = { key = "${ETHERSCAN_API_KEY}" }

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"

[lint]
exclude_lints = ["mixed-case-variable", "mixed-case-function"]

[fuzz]
runs = 256

[invariant]
runs = 32
depth = 40
fail_on_revert = true
show_metrics = true


# See more config options https://book.getfoundry.sh/reference/config/overview
